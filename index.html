<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EggCatch</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        canvas {
            display: block;
            background-color: #f0f0f0;
        }
    </style>
    <script>
        "use strict";

        let ctx;
        let score = 0;
        let prob = 0.99;
        let basketX = 0;
        let timerId = NaN;
        let basket, chick, egg1, egg2, back;
        let eggs = [];

        onload = function(){
            const canvas = document.getElementById("field");

            // 画面サイズに合わせる
            resizeCanvas();
            window.addEventListener("resize", resizeCanvas);

            ctx = canvas.getContext("2d");
            ctx.font = "32px 'Times New Roman'";

            basket = document.getElementById("basket");
            chick = document.getElementById("chick");
            egg1 = document.getElementById("egg1");
            egg2 = document.getElementById("egg2");
            back = document.getElementById("back");

            timerId = setInterval(tick, 50);

            window.onmousemove = (e) => {
                basketX = e.clientX;
            };

            window.addEventListener("touchmove", (e) => {
                e.preventDefault();
                basketX = e.touches[0].clientX;
            }, { passive: false });
        };

        function resizeCanvas() {
            const canvas = document.getElementById("field");
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function tick(){
            const canvas = document.getElementById("field");

            // 背景を画面サイズに合わせて描画
            ctx.drawImage(back, 0, 0, canvas.width, canvas.height);

            // バスケット位置
            const basketY = canvas.height - 120;
            ctx.drawImage(basket, basketX - 50, basketY);

            // 卵生成
            if(Math.random() > prob){
                eggs.push({x: Math.random() * canvas.width, y: 1, speed: 3});
            }

            // スコア表示
            ctx.fillStyle = "green";
            ctx.fillText("Score: " + score, 15, 40);

            // 卵描画
            eggs = eggs.filter((e) => {

                // 次の位置を計算
                e.speed *= 1.05;
                const nextY = e.y + e.speed;
                const nextX = e.x;

                // 当たり判定（落下後の位置）
                const hitX = (nextX > basketX - 70 && nextX < basketX + 70);
                const hitY = (nextY > basketY - 30 && nextY < basketY + 30);

                if(hitX && hitY){
                    score++;
                    return false; // ← 卵を消す（filter なら消える）
                }

                // 当たらないなら落下させる
                e.y = nextY;

                // 描画
                const eggWidth = egg1.width + 10;
                const chickWidth = chick.width + 10;

                const safeEggX = Math.max(0, Math.min(e.x, canvas.width - eggWidth));
                const safeChickX = Math.max(0, Math.min(e.x, canvas.width - chickWidth));

                if(e.y < 50){
                    ctx.drawImage(chick, safeChickX, 10);
                } else {
                    ctx.drawImage(egg1, safeEggX + 20, e.y);
                }

                // GAME OVER 判定
                if(e.y > canvas.height - 10){
                    clearInterval(timerId);
                    ctx.fillText("GAME OVER", canvas.width / 2 - 100, canvas.height / 2);
                    ctx.drawImage(egg2, e.x + 20, canvas.height - 60);
                }

                return true; // ← 卵を残す
            });
        }
    </script>
</head>
<body>
    <canvas id="field"></canvas>

    <img id="basket" style="display:none;" src="img/basket.png">
    <img id="chick" style="display:none;" src="img/chick.png">
    <img id="egg1" style="display:none;" src="img/egg1.png">
    <img id="egg2" style="display:none;" src="img/egg2.png">
    <img id="back" style="display:none;" src="img/back.png">
</body>
</html>
